<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>大何的待办事项</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell app-layout">
      <section class="capture-panel sidebar" aria-labelledby="app-title">
        <div class="brand-row">
          <div>
            <h1 id="app-title">大何的待办事项</h1>
            <p id="todayLabel"></p>
          </div>
          <div class="stats" aria-live="polite">
            <span><strong id="activeCount">0</strong> 待办</span>
            <span><strong id="doneCount">0</strong> 完成</span>
          </div>
        </div>

        <form id="taskForm" class="task-form">
          <label>
            <span>事情</span>
            <input id="taskTitle" type="text" autocomplete="off" placeholder="马上记下来" required />
          </label>
          <label>
            <span>补充</span>
            <textarea id="taskNote" rows="3" placeholder="地点、对象、下一步"></textarea>
          </label>
          <div class="form-row">
            <label>
              <span>分组</span>
              <input id="taskTag" type="text" list="tagOptions" placeholder="工作 / 生活" />
            </label>
            <label>
              <span>优先级</span>
              <select id="taskPriority">
                <option value="normal">普通</option>
                <option value="high">紧急</option>
                <option value="low">稍后</option>
              </select>
            </label>
            <button class="primary-button" type="submit">添加</button>
          </div>
          <datalist id="tagOptions"></datalist>
        </form>
      </section>

      <section class="workspace" aria-label="事项工作区">
        <section class="toolbar" aria-label="筛选">
          <div class="tabs" role="tablist" aria-label="视图">
            <button id="tabActive" class="tab active" type="button" data-view="active">待办</button>
            <button id="tabHistory" class="tab" type="button" data-view="history">历史</button>
            <button id="tabReport" class="tab" type="button" data-view="report">周报</button>
          </div>
          <input id="searchInput" class="search" type="search" placeholder="全局搜索：事情 / 评论 / 分组" />
        </section>

        <section class="content-panel">
          <section id="searchView" class="view hidden">
            <div class="search-head">
              <strong id="searchSummary">搜索结果</strong>
              <button id="clearSearch" class="ghost-button" type="button">退出搜索</button>
            </div>
            <div id="searchList" class="task-list"></div>
            <p id="emptySearch" class="empty">没有找到匹配事项。</p>
          </section>

          <section id="activeView" class="view">
            <div id="activeList" class="task-list"></div>
            <p id="emptyActive" class="empty">没有待办。</p>
          </section>

          <section id="historyView" class="view hidden">
            <div class="history-tools">
              <label>
                <span>从</span>
                <input id="historyFrom" type="date" />
              </label>
              <label>
                <span>到</span>
                <input id="historyTo" type="date" />
              </label>
              <label>
                <span>归档</span>
                <select id="historyGroup">
                  <option value="none">不分组</option>
                  <option value="week">按周</option>
                  <option value="month">按月</option>
                </select>
              </label>
              <button id="clearFilters" class="ghost-button" type="button">重置筛选</button>
            </div>
            <div id="historyList" class="task-list"></div>
            <p id="emptyHistory" class="empty">还没有历史。</p>
          </section>

          <section id="reportView" class="view hidden">
            <div class="report-tools">
              <label>
                <span>从</span>
                <input id="reportFrom" type="date" />
              </label>
              <label>
                <span>到</span>
                <input id="reportTo" type="date" />
              </label>
              <button id="copyReport" class="ghost-button" type="button">复制</button>
              <button id="downloadReport" class="ghost-button" type="button">下载</button>
            </div>
            <textarea id="reportOutput" class="report-output" spellcheck="false"></textarea>
          </section>
        </section>

        <section class="backup-bar" aria-label="备份">
          <button id="exportData" class="link-button" type="button">导出备份</button>
          <label class="file-label">
            导入备份
            <input id="importData" type="file" accept="application/json" />
          </label>
          <button id="wipeDone" class="link-button danger" type="button">清理已完成</button>
        </section>
      </section>
    </main>

    <template id="taskTemplate">
      <article class="task-item">
        <div class="task-main">
          <button class="check-button" type="button" aria-label="完成"></button>
          <div class="task-content">
            <div class="task-heading">
              <h2></h2>
              <span class="priority"></span>
            </div>
            <p class="note"></p>
            <div class="meta"></div>
          </div>
          <button class="delete-button" type="button" aria-label="删除">×</button>
        </div>
        <div class="done-comment">
          <div class="new-comment">
            <label>
              <span>追加评论</span>
              <textarea class="new-comment-input" rows="3" placeholder="这次新增一条：结果、原因、后续影响"></textarea>
            </label>
            <div class="comment-actions">
              <span class="comment-status">可多次追加，旧评论也能改</span>
              <button class="add-comment-button" type="button">追加评论</button>
            </div>
          </div>
          <div class="comment-list"></div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
